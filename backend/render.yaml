services:
  - type: web
    name: drive-safety-backend
    runtime: python
    region: singapore # or ohio, frankfurt, oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: pacer_db
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: BASE_URL
        sync: false
