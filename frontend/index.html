<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root">
      <noscript class="p-6">JavaScript is required to run this application.</noscript>
      <div id="root-fallback" style="padding:24px; color:#6b7280;">Loading application…</div>
    </div>
    <script>
      // If React fails to hydrate, keep fallback visible for troubleshooting.
      window.addEventListener('error', function (e) {
        const fb = document.getElementById('root-fallback');
        if (fb) fb.textContent = 'Application failed to load — check console for details.';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
